server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript text/html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산 캐싱 (배포 환경에서 CDN 뒤에 둬도 무방)
    location ~* \.(?:css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
